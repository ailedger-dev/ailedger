name: Deploy

# Environment promotion flow (see docs/deploy-runbook.md):
#
#   PR opened/synced  →  gates + Pages preview deploys
#   Merge to main     →  Pages production deploys
#   Release tag v*    →  Workers production deploy
#
# Workers have NO remote staging tier — develop locally with `wrangler dev`
# and ship to production on a v* tag (removed 2026-05-28 to avoid a public,
# unmonitored *.workers.dev surface; see docs/deploy-runbook.md).
#
# Pages deploys run from this workflow (not via the CF Pages Git integration):
# the integration silently stopped firing on merges in May 2026 (no commit
# statuses, no deployments — diagnosed in PR that added these jobs), so the
# main → ailedger.dev path is wired through wrangler-action here to make
# failures loud and observable in GitHub Actions. The Pages project's Git
# integration should remain DISCONNECTED to avoid racing this workflow.
#
# Secrets required (set in GitHub repo settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN    Worker-scoped API token (edit Workers + Pages,
#                           edit KV, edit D1).
#   CLOUDFLARE_ACCOUNT_ID   Jake's CF account ID.
#
# All Worker production secrets (SESSION_JWT_SECRET, ANTHROPIC_API_KEY, etc.)
# are managed via `wrangler secret put` and NEVER live in this workflow.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  # Fired by ailedger-dev/charter's notify-site workflow when CHARTER.md (or a
  # sibling .md the page renders) changes on main. Lets us rebuild the
  # generated /charter page without waiting for an unrelated commit here.
  repository_dispatch:
    types: [charter-updated]

concurrency:
  # One lane per (event, ref). PR preview runs may cancel each other; prod and
  # main have their own lane.
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  gates:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            proxy/package-lock.json
            landing/package-lock.json
            dashboard/package-lock.json
            redirect/package-lock.json

      # proxy — only surface with a real test suite today.
      - name: proxy install
        run: npm ci
        working-directory: proxy
      - name: proxy test
        run: npm test -- --run
        working-directory: proxy

      # landing — typecheck + lint via build.
      - name: landing install
        run: npm ci
        working-directory: landing
      - name: landing lint
        run: npm run lint
        working-directory: landing
      - name: landing build
        run: npm run build
        working-directory: landing
      - name: landing SEO guardrail
        # Asserts the built homepage matches landing/seo.config.json (title,
        # description, keywords, canonical, OG) and that no sitemap <loc> is a
        # soft-404. Blocks regressions like Google rewriting the title to the
        # bare domain. Runs against dist/ from the build step above.
        run: npm run seo:check
        working-directory: landing

      # dashboard — typecheck + lint via build.
      - name: dashboard install
        run: npm ci
        working-directory: dashboard
      - name: dashboard lint
        # Non-fatal until the dashboard's pre-existing lint errors are
        # cleaned up; keeps lint visible without blocking unrelated work.
        continue-on-error: true
        run: npm run lint
        working-directory: dashboard
      - name: dashboard build
        run: npm run build
        working-directory: dashboard

  deploy-production:
    name: Deploy Workers → production
    needs: gates
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      # GitHub "production" environment enforces required-reviewers before
      # this job runs. Configure reviewers in repo Settings → Environments.
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # JCS canary (threat model §6.8): runs in proxy's install context, so a
      # broken node_modules (the 2026-04-29 outage cause) fails the deploy
      # instead of shipping a chain that silently forks future hashes.
      - uses: ./.github/actions/wrangler-deploy
        with:
          worker: proxy
          command: deploy
          preCommands: npm run canary
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - uses: ./.github/actions/wrangler-deploy
        with:
          worker: redirect
          command: deploy
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Pages deploys — replaces the CF Pages Git integration (see top-of-file note).
  # Matrix runs landing + dashboard in parallel; fail-fast off so one project's
  # failure doesn't kill the other's deploy.
  deploy-pages-preview:
    name: Deploy Pages → preview (${{ matrix.project }})
    needs: gates
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [landing, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: install
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: build
        run: npm run build
        working-directory: ${{ matrix.project }}
      - name: pages deploy (preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.95.0'
          workingDirectory: ${{ matrix.project }}
          command: pages deploy dist --project-name=ailedger-${{ matrix.project }} --branch=${{ github.head_ref }}

  deploy-pages-production:
    name: Deploy Pages → production (${{ matrix.project }})
    needs: gates
    # Run on main pushes (full matrix) and on a charter-updated dispatch from
    # ailedger-dev/charter (landing only — dashboard doesn't render charter).
    # The matrix is set per-event below.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'charter-updated')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ github.event_name == 'repository_dispatch' && fromJSON('["landing"]') || fromJSON('["landing","dashboard"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: install
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: build
        run: npm run build
        working-directory: ${{ matrix.project }}
      - name: pages deploy (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.95.0'
          workingDirectory: ${{ matrix.project }}
          command: pages deploy dist --project-name=ailedger-${{ matrix.project }} --branch=main

      # Google exposes no public indexing API — re-crawl is a manual step.
      # Surface the reminder on every landing production deploy.
      - name: Search Console reminder (manual re-crawl)
        if: matrix.project == 'landing'
        run: |
          {
            echo "## ⚠️ Manual step: request Google re-crawl"
            echo ""
            echo "Google has **no public indexing API**, so the SEO changes just deployed"
            echo "will not appear in search results until you trigger a re-crawl by hand:"
            echo ""
            echo "1. Open <https://search.google.com/search-console> (property: \`ailedger.dev\`)"
            echo "2. **URL Inspection** → enter \`https://ailedger.dev/\` → **Request Indexing**"
            echo "3. **Sitemaps** → confirm \`https://ailedger.dev/sitemap.xml\` is submitted"
          } >> "$GITHUB_STEP_SUMMARY"
