name: Wrangler deploy
description: Deploy a worker via cloudflare/wrangler-action with the repo's pinned wrangler version.

# Pin wrangler@4.x for reproducible deploys (wrangler-action@v3 otherwise
# defaults to an older wrangler).
#
# Auth: the Cloudflare token/account are passed in as `apiToken`/`accountId`
# inputs and forwarded to wrangler-action explicitly. wrangler-action@v3 does
# NOT pick up an ambient CLOUDFLARE_API_TOKEN from the job env on its own — it
# authenticates from these inputs — so the caller must pass them from
# `secrets.*`. (Composite actions can't read `secrets.*` directly.)

inputs:
  worker:
    description: Worker directory under the repo root (e.g. proxy, redirect).
    required: true
  command:
    description: 'Wrangler command, e.g. "deploy".'
    required: true
  apiToken:
    description: 'Cloudflare API token — pass ${{ secrets.CLOUDFLARE_API_TOKEN }}.'
    required: true
  accountId:
    description: 'Cloudflare account ID — pass ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.'
    required: true
  preCommands:
    description: 'Commands run before wrangler, e.g. "npm run canary" for the JCS chain-integrity canary.'
    required: false
    default: ''
  soft-fail:
    description: 'If "true", deploy failures do not fail the calling step. Used for workers with placeholder bindings until IDs land.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: ${{ inputs.worker }} — wrangler ${{ inputs.command }}
      continue-on-error: ${{ inputs.soft-fail == 'true' }}
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.apiToken }}
        accountId: ${{ inputs.accountId }}
        wranglerVersion: '4.84.1'
        workingDirectory: ${{ inputs.worker }}
        preCommands: ${{ inputs.preCommands }}
        command: ${{ inputs.command }}
