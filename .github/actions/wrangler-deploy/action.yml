name: Wrangler deploy
description: Deploy a worker via cloudflare/wrangler-action with the repo's pinned wrangler version.

# Pin wrangler@4.x for reproducible deploys (wrangler-action@v3 otherwise
# defaults to an older wrangler).
#
# CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are read from the calling
# job's env (set as job-level env mapped from secrets in the workflow);
# composite actions cannot reach `secrets.*` directly.

inputs:
  worker:
    description: Worker directory under the repo root (e.g. proxy, redirect).
    required: true
  command:
    description: 'Wrangler command, e.g. "deploy".'
    required: true
  preCommands:
    description: 'Commands run before wrangler, e.g. "npm run canary" for the JCS chain-integrity canary.'
    required: false
    default: ''
  soft-fail:
    description: 'If "true", deploy failures do not fail the calling step. Used for workers with placeholder bindings until IDs land.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: ${{ inputs.worker }} — wrangler ${{ inputs.command }}
      continue-on-error: ${{ inputs.soft-fail == 'true' }}
      uses: cloudflare/wrangler-action@v3
      with:
        wranglerVersion: '4.84.1'
        workingDirectory: ${{ inputs.worker }}
        preCommands: ${{ inputs.preCommands }}
        command: ${{ inputs.command }}
